services:
  obsctl:
    build: .
    container_name: obsctl
    volumes:
      - ./vault:/vault
      - ./onedrive-conf:/onedrive-conf
      - obsidian-config:/home/obsidian/.config/obsidian
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - ONEDRIVE_AUTHRESPONSE=${ONEDRIVE_AUTHRESPONSE:-}
    restart: unless-stopped

volumes:
  obsidian-config:
